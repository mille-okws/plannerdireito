<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoje — Execução</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="hoje.css">
</head>
<body>

<nav class="main-nav">
  <div class="nav-container">
    <span class="nav-title">SISTEMA_EDITAL</span>
    <ul class="nav-links">
      <li><a href="index.html">Visão geral</a></li>
      <li><a href="hoje.html">Hoje</a></li>
      <li><a href="ciclo.html">Ciclo</a></li>
      <li><a href="estatisticas.html">Estatísticas</a></li>
      <li><a href="config.html">Configurações</a></li>
    </ul>
  </div>
</nav>

<main class="container">
  <header>
    <h1>Execução diária</h1>
    <p id="current-date-display">—</p>

    <div class="cycle-summary">
      <span>Meta: <strong id="daily-target">0h</strong></span>
      <span>Estudado: <strong id="daily-done">0h 00m</strong></span>
    </div>

    <div class="global-progress">
      <div class="global-progress-fill" id="daily-progress-bar"></div>
    </div>
  </header>

  <section class="today-grid">
    <section>
      <section class="timer-section">
        <h2 id="active-subject-title">Selecione uma matéria</h2>
        <div class="timer-container">
          <div class="timer-bg">88:88:88</div>
          <div class="timer-display" id="main-timer">00:00:00</div>
        </div>

        <div class="timer-controls">
          <button id="btn-start">Iniciar</button>
          <button id="btn-pause">Pausar</button>
          <button id="btn-stop" class="danger">Finalizar</button>
        </div>
      </section>

      <section class="panel">
        <h3>Matérias de hoje</h3>
        <div id="today-subjects-list">
          <div class="subject-card active">
            <div class="subject-info">
              <strong>Direito Constitucional</strong>
              <small>Progresso: 45%</small>
              <div class="progress-mini">
                <div class="progress-mini-fill" style="width: 45%;"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </section>

    <aside>
      <section class="panel">
        <h3>Log de sessões</h3>
        <div class="session-log" id="session-log-list">
          <p class="empty-log">Nenhuma sessão registrada.</p>
        </div>
        <button id="btn-clear-logs" class="danger" style="width: 100%; margin-top: 15px;">
          Limpar Progresso
        </button>
      </section>
    </aside>
  </section>
</main>

<script src="hoje.js"></script>
</body>
</html>
